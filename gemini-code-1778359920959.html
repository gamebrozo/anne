<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canım Annem</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, #fff0f0 0%, #ffdfdf 100%);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Uçuşan Kalpler */
        .heart-particle {
            position: absolute;
            color: rgba(255, 107, 107, 0.4);
            pointer-events: none;
            animation: floatUp 5s linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(1); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 45px 25px;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(255, 150, 150, 0.3);
            text-align: center;
            width: 85%;
            max-width: 360px;
            z-index: 10;
            border: 1px solid white;
        }

        .main-heart {
            font-size: 80px;
            color: #ff6b6b;
            cursor: pointer;
            animation: beat 1.4s infinite;
            display: inline-block;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d63031;
            font-size: 2.6rem;
            margin: 10px 0;
        }

        #dynamic-text {
            font-size: 1.1rem;
            color: #555;
            min-height: 60px;
            margin: 25px 0;
            line-height: 1.5;
            font-style: italic;
            transition: opacity 0.8s;
        }

        .play-btn {
            background: #d63031;
            color: white;
            border: none;
            padding: 16px 35px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(214, 48, 49, 0.3);
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="heart-container"></div>

    <div class="card">
        <div class="main-heart" onclick="baslat()">❤️</div>
        <h1>Canım Annem</h1>
        <p id="dynamic-text">Senin için hazırladığım sürpriz burada gizli...</p>

        <!-- Aynı duygusal slow piyano müziği -->
        <audio id="musicPlayer" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
        </audio>

        <button class="play-btn" onclick="baslat()" id="btnControl">Sürprizi Başlat 🎵</button>
    </div>

    <script>
        const audio = document.getElementById('musicPlayer');
        const btn = document.getElementById('btnControl');
        const text = document.getElementById('dynamic-text');
        
        const messages = [
            "Dünyanın en güzel annesine...",
            "Varlığın hayatımın en büyük hediyesi.",
            "Bu melodi senin gibi huzur veriyor.",
            "İyi ki varsın, seni her şeyden çok seviyorum ❤️"
        ];
        let index = 0;
        let isStarted = false;

        function baslat() {
            if (audio.paused) {
                audio.play();
                btn.innerText = "Seni Seviyorum ❤️";
                if (!isStarted) {
                    isStarted = true;
                    startEffects();
                }
            } else {
                audio.pause();
                btn.innerText = "Dinlemeye Devam Et 🎵";
            }
        }

        function startEffects() {
            // Yazı değiştirme döngüsü
            setInterval(() => {
                text.style.opacity = 0;
                setTimeout(() => {
                    index = (index + 1) % messages.length;
                    text.innerText = messages[index];
                    text.style.opacity = 1;
                }, 800);
            }, 4500);

            // Kalp yağmuru döngüsü
            setInterval(() => {
                const p = document.createElement('div');
                p.className = 'heart-particle';
                p.innerText = '❤️';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.fontSize = (Math.random() * 15 + 10) + 'px';
                document.getElementById('heart-container').appendChild(p);
                setTimeout(() => p.remove(), 5000);
            }, 400);
        }
    </script>
</body>
</html>
